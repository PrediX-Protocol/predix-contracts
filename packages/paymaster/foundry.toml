[profile.default]
src = "src"
out = "out"
libs = ["../../lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.30"
evm_version = "cancun"
bytecode_hash = "none"
via_ir = true
optimizer = true
optimizer_runs = 200
ffi = true

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

[lint]
exclude_lints = ["screaming-snake-case-immutable", "screaming-snake-case-const"]
lint_on_build = false

[etherscan]
unichain_sepolia = { key = "${ETHERSCAN_API_KEY}", url = "${ETHERSCAN_V2_URL}", chain = 1301 }
